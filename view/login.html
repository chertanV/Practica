<!-- login.html — форма входа: email, пароль, кнопка «Войти», ссылка на регистрацию -->
<div class="login-page">
  <div class="login-card card">
    <h2 class="login-title">Вход в систему</h2>
    <form id="loginForm" class="login-form">
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@mail.com" required>
      </div>
      <div class="form-field">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <p id="errorMessage" class="error-msg hidden"></p>
      <button type="submit" id="loginBtn" class="btn btn-primary w-full">Войти</button>
      <p class="text-sm mt-8">
        Нет аккаунта?
        <a href="#" class="nav-link" data-route="register">Зарегистрироваться</a>
      </p>
    </form>
  </div>
</div>
