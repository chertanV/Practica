<!-- main.html — шаблон главной: сводка (выручка, заказы, товары в наличии), блок «Нет в наличии», кнопки переходов -->
<div class="page-header">
  <div>
    <h1 class="page-title">Главная</h1>
    <p class="page-subtitle">Краткий обзор продаж и быстрый доступ к разделам</p>
  </div>
</div>

<div class="flex gap-16">
  <div class="card" style="flex: 2;">
    <div class="card-header">
      <div>
        <h3 class="card-title">Текущая сводка</h3>
        <p class="card-subtitle">Показатели за всё время</p>
      </div>
    </div>
    <div class="flex gap-16">
      <div class="card" style="flex:1;">
        <div class="card-subtitle">Общая выручка</div>
        <h2 class="price mt-16" id="statSalesToday">0 ₽</h2>
      </div>
      <div class="card" style="flex:1;">
        <div class="card-subtitle">Количество заказов</div>
        <h2 class="price mt-16" id="statOrdersToday">0</h2>
      </div>
      <div class="card" style="flex:1;">
        <div class="card-subtitle">Активных товаров</div>
        <h2 class="price mt-16" id="statProductsCount">0</h2>
      </div>
    </div>
  </div>

  <div class="card" style="flex: 1;">
    <div class="card-header">
      <div>
        <h3 class="card-title">Быстрые действия</h3>
        <p class="card-subtitle">Часто используемые разделы</p>
      </div>
    </div>
    <div class="flex flex-col gap-12">
      <button id="goReports" class="btn btn-primary w-full" data-role="admin">Перейти к отчётам</button>
      <button id="goSales" class="btn btn-secondary w-full">Продажи</button>
      <button id="goProducts" class="btn btn-secondary w-full">Перейти к товарам</button>
      <button id="goSuppliers" class="btn btn-secondary w-full" data-role="admin">Поставщики</button>
      <button id="goImports" class="btn btn-secondary w-full">Товары и импорт</button>
    </div>
  </div>
</div>

<div class="card mt-16" id="outOfStockCard">
  <div class="card-header">
    <div>
      <h3 class="card-title">Нет в наличии</h3>
      <p class="card-subtitle">Товары с нулевым остатком — требуется пополнение</p>
    </div>
    <a href="#" class="nav-link" data-route="products">К товарам →</a>
  </div>
  <div id="outOfStockList" class="out-of-stock-list">
    <p class="text-muted text-sm">Загрузка...</p>
  </div>
</div>
