<div class="page-header">
  <div>
    <h1 class="page-title">Товары</h1>
    <p class="page-subtitle">Список номенклатуры с фильтрами по поставщику и категории</p>
  </div>
</div>

<div class="card mb-20">
  <div class="card-header">
    <div>
      <h3 class="card-title">Фильтры и поиск</h3>
      <p class="card-subtitle">Выберите поставщика, категорию или найдите по названию</p>
    </div>
    <div class="btn-group">
      <button id="addProductBtn" class="btn btn-primary">+ Новый товар</button>
      <button id="backMain" class="btn btn-secondary">Назад</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="filter-group">
      <span class="filter-label">Поставщик</span>
      <select id="supplierFilter" class="filter-select">
        <option value="">Все поставщики</option>
      </select>
    </div>

    <div class="filter-group">
      <span class="filter-label">Категория</span>
      <select id="categoryFilter" class="filter-select">
        <option value="">Все категории</option>
      </select>
    </div>

    <div class="search-wrap">
      <input type="text" id="searchImput" class="search-input" placeholder="Поиск по названию">
    </div>

    <button id="applyFilter" class="btn btn-secondary">Применить</button>
  </div>
</div>

<div class="results-info">
  Найдено товаров: <span id="productsCount">0</span>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Название</th>
        <th>Поставщик</th>
        <th>Категория</th>
        <th>Цена</th>
        <th>Остаток</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="productsTable"></tbody>
  </table>
</div>

<div class="modal-overlay" id="productModalOverlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 class="modal-title" id="productModalTitle">Новый товар</h3>
      <button type="button" class="modal-close" id="productModalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-field">
          <label for="productName">Название</label>
          <input type="text" id="productName" placeholder="Например: Ноутбук" required>
        </div>
        <div class="form-field">
          <label for="productSupplier">Поставщик</label>
          <input type="text" id="productSupplier" placeholder="Например: ООО Рога и копыта">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="productCategory">Категория</label>
          <input type="text" id="productCategory" placeholder="Например: Электроника">
        </div>
        <div class="form-field">
          <label for="productPrice">Цена</label>
          <input type="number" id="productPrice" min="0" step="0.01" placeholder="0">
        </div>
      </div>
      <div class="form-field">
        <label for="productStock">Остаток</label>
        <input type="number" id="productStock" min="0" step="1" placeholder="0">
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-cancel" id="productModalCancel">Отмена</button>
      <button type="button" class="btn-save" id="productModalSave">Сохранить</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="sellModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Продать товар</h3>
      <button type="button" class="modal-close" id="sellModalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label>Товар</label>
        <p id="sellProductName" class="text-muted"></p>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="sellQuantity">Количество</label>
          <input type="number" id="sellQuantity" min="1" value="1" placeholder="1">
        </div>
        <div class="form-field">
          <label for="sellDate">Дата продажи</label>
          <input type="date" id="sellDate">
        </div>
      </div>
      <div class="form-field">
        <label for="sellPrice">Цена за единицу</label>
        <input type="number" id="sellPrice" min="0" step="0.01" placeholder="0">
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-cancel" id="sellModalCancel">Отмена</button>
      <button type="button" class="btn-save" id="sellModalSave">Оформить продажу</button>
    </div>
  </div>
</div>
